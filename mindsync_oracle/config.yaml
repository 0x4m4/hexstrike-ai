# MindSync Oracle Configuration

# API Keys
api:
  anthropic_key: ${ANTHROPIC_API_KEY}  # Required for Claude
  openai_key: ${OPENAI_API_KEY}        # Optional for Whisper voice

# xAI/Grok Integration (v4)
xai:
  enabled: false                       # Enable for Grok integration
  api_key: ${XAI_API_KEY}             # Get at https://x.ai/api
  base_url: "https://api.x.ai/v1/chat/completions"
  model: "grok-beta"                  # or "grok-3" for free tier

# Multi-LLM Router (v4)
llm_router:
  intelligence: "grok"                # Use Grok for intelligence gathering
  tools: "claude"                     # Use Claude for tool execution
  reasoning: "claude"                 # Use Claude for structured reasoning
  search: "grok"                      # Use Grok for web/X searches
  hybrid: "auto"                      # Auto-select based on performance

# Database
database:
  path: "mindsync_memory.db"
  graph_path: "mindsync_graph.pkl"   # v3: Memory graph storage
  backup_enabled: true
  backup_interval_hours: 24

# Agent Settings
agent:
  model: "claude-sonnet-4-5-20250929"
  max_tokens: 8000
  temperature: 0.7
  system_prompt_prefix: "You are MindSync Oracle, a persistent AI agent with autonomous capabilities."

# Goal Engine
goals:
  check_interval_seconds: 60        # Check for active goals every minute
  max_concurrent_goals: 3
  auto_decompose: true              # Automatically break goals into sub-tasks
  proactive_reporting: true         # Report completed goals proactively

# HexStrike Integration
hexstrike:
  enabled: true
  server_url: "http://localhost:8888"
  timeout_seconds: 300
  auto_load_tools: true

# Background Scheduler
scheduler:
  enabled: true
  jobs:
    - name: "goal_processor"
      interval_minutes: 1
      enabled: true

    - name: "pattern_analyzer"
      interval_minutes: 30
      enabled: true

    - name: "cve_monitor"
      interval_hours: 6
      enabled: false  # Enable manually for CVE monitoring

    - name: "memory_cleanup"
      interval_days: 7
      enabled: true

# Live Threat Feed (v4)
threat_feed:
  enabled: false                       # Enable for proactive threat monitoring
  check_interval: 3600                # Check every hour (seconds)
  auto_create_goals: false            # Auto-create goals for high-priority threats
  priority_threshold: "high"          # Minimum priority to act on (low/medium/high/critical/urgent)

  sources:
    - x_security                      # X/Twitter security community
    - cve_new                         # New CVEs
    - exploit_db                      # Exploit database
    - threat_intel                    # General threat intelligence

# Deep X Intelligence Nexus (v5)
deep_x:
  enabled: false                       # Enable for X researcher graphs & timeline analysis
  check_interval: 7200                # Check every 2 hours (seconds)
  min_posts_for_profile: 5            # Minimum posts to create researcher profile
  track_researchers: true             # Build researcher dossiers
  detect_clusters: true               # Detect collaboration networks
  timeline_analysis: true             # Track temporal patterns

  # Timeline parameters
  surge_threshold: 2.0                # 2x baseline = surge
  window_days: 30                     # Analysis window
  baseline_days: 7                    # Baseline calculation period

  # Researcher profiling
  top_researchers_count: 50           # Track top N researchers
  expertise_areas:
    - web_security
    - network_security
    - exploit_dev
    - reverse_engineering
    - cloud_security
    - mobile_security
    - malware_analysis
    - osint

# Federated Swarm (v6)
swarm:
  enabled: false                       # Enable for federated multi-oracle deployment
  swarm_id: "mindsync_swarm"          # Swarm identifier
  member_id: "oracle_primary"         # This oracle's ID (must be unique)
  role: "hybrid"                      # coordinator, worker, monitor, or hybrid

  # Communication
  pub_port: 5555                      # Port for publishing messages
  sub_peers: []                       # List of peer URLs to subscribe to
                                      # Example: ["tcp://192.168.1.10:5555", "tcp://192.168.1.11:5555"]

  # Security
  encryption_key: ${SWARM_ENCRYPTION_KEY}  # 32-byte Fernet key for encrypted comms
                                           # Generate with: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"

  # Goal sharding
  max_tasks_per_member: 5             # Max concurrent tasks per oracle
  task_timeout: 600                   # Task timeout in seconds (10 minutes)

  # Consensus
  consensus_threshold: 0.6            # 60% approval for conflicting changes
  vote_timeout: 30                    # Voting timeout in seconds
  min_voters: 2                       # Minimum voters for consensus

  # Dashboard
  refresh_interval: 5                 # Dashboard refresh interval (seconds)
  history_retention: 3600             # Metric history retention (seconds, 1 hour)

# Real-Time Intelligence (v7)
realtime_x:
  enabled: false                      # Enable real-time X/Twitter firehose
  keywords:                           # Keywords to filter
    - CVE
    - exploit
    - vulnerability
    - WordPress
    - RCE
    - SQL injection
    - XSS
    - authentication bypass

  # Stream mode
  websocket_enabled: false            # WebSocket streaming (not yet implemented)
  polling_interval: 60                # Polling interval in seconds

  # Filtering
  min_relevance: 0.3                  # Minimum relevance score (0-1)
  rate_limit: 100                     # Max posts per minute

  # Surge detection
  surge_window: 300                   # Surge detection window (5 minutes)
  surge_threshold: 3.0                # Surge threshold (3x baseline)

# Ethical Dark Web OSINT (v7)
tor_osint:
  enabled: false                      # Enable Tor dark web OSINT
  ethical_mode: true                  # REQUIRED - must be true to run

  # ⚠️  ETHICAL USE ONLY ⚠️
  # This feature is STRICTLY for:
  # - Authorized security research
  # - Defensive threat intelligence
  # - Public exploit database mirrors
  # - Compliance with all applicable laws
  #
  # NOT for illegal activities, unauthorized access, or malicious purposes

  # Tor configuration
  tor_control_port: 9051              # Tor control port
  tor_socks_port: 9050                # Tor SOCKS proxy port

  # Allowed domains (strict allowlist)
  allowed_domains: []                 # Add verified .onion domains only
                                      # Example: ["exploit-db-mirror.onion"]
                                      # IMPORTANT: Verify domains are legitimate
                                      # public research sources before adding

  # Scraping
  scrape_interval: 1800               # Scrape interval (30 minutes)

  # Credibility filtering
  min_credibility: 0.6                # Minimum credibility score (60%)

  # Audit logging
  audit_log_path: "tor_osint_audit.log"  # Audit log for compliance

# Unified Threat Hub (v7)
unified_threat_hub:
  enabled: false                      # Enable unified threat correlation

  # Correlation
  correlation_window: 3600            # Threat correlation window (1 hour)

  # Auto-goal triggering
  auto_goal_confidence_threshold: 0.75  # Min confidence for auto-goals (75%)
  auto_goal_min_sources: 2            # Min sources for cross-validation
  auto_goal_cooldown: 3600            # Cooldown between similar goals (1 hour)

# XBOW-Inspired Vulnerability Research (v8)
xbow_mode:
  enabled: false                      # Enable XBOW-inspired vulnerability research
  ethical_only: true                  # REQUIRED - must be true to run

  # ⚠️  ETHICAL USE ONLY - AUTHORIZED ENVIRONMENTS ONLY ⚠️
  # This feature is STRICTLY for:
  # - Authorized CTF competitions (HackTheBox, TryHackMe, CTFTime)
  # - Personal lab environments (owned infrastructure)
  # - Authorized red team engagements (written permission)
  # - Bug bounty research (manual submission only)
  # - Educational security research
  #
  # NOT for production systems, unauthorized targets, or malicious purposes

  # Human-in-the-Loop Control
  human_in_loop:
    enabled: true                     # REQUIRED - mandatory approval for all actions
    approval_timeout: 300             # Approval timeout in seconds (5 minutes)
    audit_log: "v8_audit.log"         # Audit log for all actions
    require_all_approvals: true       # Every action requires approval (no exceptions)

  # Scope Validation
  scope_validator:
    enabled: true                     # REQUIRED - hard scope enforcement
    scope_file: "authorized_scope.yaml"  # Path to scope configuration
    audit_log: "scope_validation_audit.log"  # Scope validation audit log
    reject_out_of_scope: true         # Hard reject for out-of-scope targets

  # Sandbox Execution
  sandbox:
    enabled: true                     # REQUIRED - all tools run in containers
    default_mode: true                # Use sandbox by default (no host execution)
    image: "kalilinux/kali-rolling"   # Docker image for security tools
    network_mode: "bridge"            # Network mode (none/bridge/host)
    memory_limit: "1g"                # Memory limit per container
    cpu_limit: 2.0                    # CPU limit (number of CPUs)
    timeout: 300                      # Default execution timeout (5 minutes)

  # Vulnerability Research Assistant
  vuln_research:
    min_confidence: 0.6               # Minimum confidence for chain suggestions
    patterns_enabled: true            # Use predefined vulnerability patterns
    cross_source_boost: 0.15          # Confidence boost for cross-source validation
    cve_boost: 0.1                    # Confidence boost for CVE mentions

  # Chain Predictor
  chain_predictor:
    min_confidence: 0.6               # Minimum confidence for predictions
    temporal_grouping: 3600           # Group threats within 1 hour window
    eta_prediction: true              # Predict time to public exploit

  # CTF Lab Agent
  ctf_agent:
    enabled: false                    # Enable CTF-solving agent
    max_concurrent_challenges: 1      # Max challenges to work on simultaneously
    auto_writeup: true                # Generate writeups automatically
    flag_regex: "CTF\\{[^}]+\\}"      # Regex to detect flags

  # Integration
  integration:
    hexstrike_enabled: true           # Use HexStrike tools when available
    v7_threat_hub: true               # Use v7 unified threat hub
    v5_deep_x: false                  # Use v5 researcher graphs (optional)

  # Reporting
  reporting:
    generate_writeups: true           # Generate challenge writeups
    writeup_path: "v8_writeups/"      # Path for writeup storage
    include_methodology: true         # Include detailed methodology
    include_ethical_notes: true       # Include ethical considerations

# v9: Elite Orchestration Layer
v9_orchestration:
  enabled: false                      # Enable v9 enhancements

  # MCP Integration
  mcp:
    shodan:
      enabled: false                  # Shodan device/IP intelligence
      api_key: ${SHODAN_API_KEY}      # Get at https://account.shodan.io/

    virustotal:
      enabled: false                  # VirusTotal malware/reputation
      api_key: ${VIRUSTOTAL_API_KEY}  # Get at https://virustotal.com/

    nist:
      enabled: true                   # NIST NVD CVE database (public, no key)

  # Confidence Scoring
  confidence_scoring:
    enabled: true                     # Enable confidence assessment

    # Thresholds (0-1)
    thresholds:
      high: 0.8                       # High confidence (auto-approve)
      medium: 0.7                     # Medium (proceed with caution)
      low: 0.5                        # Low (route to human approval)
      reject: 0.3                     # Very low (reject for safety)

    # Factor weights
    weights:
      quality: 0.20                   # Output quality weight
      certainty: 0.25                 # Certainty (inverse hedging) weight
      graph_consistency: 0.25         # Memory graph validation weight
      source_validation: 0.20         # Cross-source confirmation weight
      historical_accuracy: 0.10       # Historical prediction accuracy weight

    # Auto-routing
    route_low_confidence_to_human: true      # <0.7 → human approval
    route_very_low_to_swarm: true            # <0.5 → swarm consensus
    reject_extremely_low: true               # <0.3 → hard reject

  # Parallel Execution
  parallel_execution:
    enabled: true                     # Enable parallel chain execution
    max_parallel: 5                   # Max concurrent steps
    use_swarm: false                  # Distribute to v6 swarm (requires swarm enabled)
    timeout: 60                       # Step timeout in seconds

    # Optimization
    estimate_sequential_time: true    # Calculate time saved vs sequential
    cache_results: true               # Cache step results (1 hour TTL)

# Notifications
notifications:
  enabled: true
  methods:
    - desktop      # Desktop notifications
    - log          # Log file
    - terminal     # Terminal output

  levels:
    goal_completed: true
    goal_failed: true
    critical_finding: true
    pattern_detected: false
    info: false

# Memory Management
memory:
  max_conversations: 1000
  max_patterns: 500
  retention_days: 365
  auto_cleanup: true

  # What to remember
  store_conversations: true
  store_patterns: true
  store_decisions: true
  store_tool_usage: true

# Logging
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  file: "mindsync.log"
  max_size_mb: 100
  backup_count: 5
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# Security
security:
  encrypt_database: false  # Set to true for encryption at rest
  encryption_key: ${MINDSYNC_ENCRYPTION_KEY}
  require_api_key_validation: true

# Performance
performance:
  max_memory_mb: 1000
  cache_enabled: true
  cache_ttl_seconds: 3600

# Development
development:
  debug_mode: false
  verbose_logging: false
  mock_api_calls: false  # Set to true for testing without API keys
